<!DOCTYPE html>

<title>Cyberpunk Z Logo Glow</title>
<style>
  body {
    margin: 0; padding: 0;
    background: #0a0a0f;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
  }
</style>

<svg xmlns="http://www.w3.org/2000/svg" width="330.275634765625" height="327.0625" viewBox="0 0 330.275634765625 327.0625">
  <defs>
    <style>
      .spin-container {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        overflow: hidden;
      }
      .spin-glow-forward {
        width: 150%;
        height: 150%;
        position: absolute;
        border-radius: 50%;
        background: conic-gradient(from 0deg,
          #ff0055, #ff6600, #ffcc00, #00ff66, #00ccff, #9933ff, #ff0055);
        animation: rotate-forward 4.2s linear infinite;
      }
      .spin-glow-reverse {
        width: 150%;
        height: 150%;
        position: absolute;
        border-radius: 50%;
        background: conic-gradient(from 0deg,
          #ff0055, #ff6600, #ffcc00, #00ff66, #00ccff, #9933ff, #ff0055);
        animation: rotate-reverse 5s linear infinite;
      }
      @keyframes rotate-forward {
        0%   { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes rotate-reverse {
        0%   { transform: rotate(360deg); }
        100% { transform: rotate(0deg); }
      }
    </style>
